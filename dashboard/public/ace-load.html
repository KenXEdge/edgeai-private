<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACE+ · Load</title>
<!--
  ACE+ SINGLE-LINK LANDING PAGE
  Reached from /api/[token].js when platform_config.sms_single_link = true.
  One token (send_bid_token) backs BOTH actions. The endpoint called determines
  the action, not the token — see _ace_execute_bid bid-family lookup in main.py.

  Clone of ace-bid.html. Same styles, same /ace-load-info fetch, same POST payload
  {t, bid_amount}. Only difference: two action buttons instead of one.
  ace-bid.html / ace-draft.html / ace-pass.html are UNCHANGED and still live.

  Consume-guard: enforced in THREE places, in order —
    1. /api/[token].js  -> 302 /already-used.html if consumed_at set
    2. this page        -> hard-locks the card if /ace-load-info returns consumed
    3. _ace_execute_bid -> returns {"status":"already-actioned"} (first-wins, authoritative)
  Layer 3 is the one that guarantees no double-bid. 1 and 2 are UX.
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#f0f0f0;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#111;border:1px solid #222;border-radius:12px;padding:36px 30px;max-width:420px;width:90%}
  .kicker{font-size:13px;letter-spacing:2px;color:#c8f135;text-transform:uppercase;text-align:center;margin-bottom:22px;font-weight:700}
  .lane{text-align:center}
  .lane-city{font-size:24px;font-weight:800;color:#f0f0f0;line-height:1.2}
  .lane-mid{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0;color:#555}
  .lane-mid .line{height:1px;width:40px;background:#2a2a2a}
  .lane-mid .miles{font-size:14px;font-weight:500;color:#888;white-space:nowrap}
  .bidbox{background:#0e0e0e;border:1px solid #222;border-radius:10px;padding:20px;margin:26px 0 14px;text-align:center}
  .bid-label{font-size:11px;letter-spacing:1.5px;color:#777;text-transform:uppercase;margin-bottom:10px}
  .bid-input-wrap{display:flex;align-items:center;justify-content:center;gap:2px}
  .bid-dollar{font-size:30px;font-weight:800;color:#c8f135}
  .bid-input{background:transparent;border:none;border-bottom:2px solid #333;color:#c8f135;font-size:30px;font-weight:800;width:150px;text-align:center;font-family:Arial,sans-serif;outline:none}
  .bid-input:focus{border-bottom-color:#c8f135}
  .rpm{font-size:14px;color:#888;margin-top:10px}
  .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#222;border:1px solid #222;border-radius:10px;overflow:hidden;margin-bottom:16px}
  .m{background:#0e0e0e;padding:12px 8px;text-align:center}
  .m-label{font-size:9px;letter-spacing:1.5px;color:#777;text-transform:uppercase;margin-bottom:5px}
  .m-val{font-size:15px;font-weight:700;color:#e8e8e8}
  .broker{text-align:center;font-size:15px;color:#777;margin-bottom:22px}
  .broker b{color:#aaa;font-weight:600}
  .btn{display:block;width:100%;padding:16px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:none;margin-bottom:12px}
  .btn-go{background:#c8f135;color:#0a0a0a}
  .btn-draft{background:#1a1a1a;color:#c8f135;border:1px solid #3a4a12}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .msg{margin-top:6px;font-size:13px;color:#888;text-align:center;min-height:18px}
  .sched{display:none;border:1px solid #222;border-radius:10px;margin:0 0 16px;overflow:hidden}
  .sched-row{display:flex;justify-content:space-between;padding:11px 16px;font-size:13px}
  .sched-row+.sched-row{border-top:1px solid #1c1c1c}
  .sched-label{color:#777}
  .sched-val{color:#e8e8e8;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="kicker" id="kicker">ACE+ · Load</div>
    <div class="lane">
      <div class="lane-city" id="lane-from">—</div>
      <div class="lane-mid"><span class="line"></span><span class="miles" id="miles"></span><span class="line"></span></div>
      <div class="lane-city" id="lane-to">—</div>
    </div>
    <div class="sched" id="sched">
      <div class="sched-row" id="row-pickup"><span class="sched-label">Pickup</span><span class="sched-val" id="sched-pickup"></span></div>
      <div class="sched-row" id="row-delivery"><span class="sched-label">Delivery</span><span class="sched-val" id="sched-delivery"></span></div>
    </div>
    <div class="bidbox">
      <div class="bid-label">Your Bid</div>
      <div class="bid-input-wrap"><span class="bid-dollar">$</span><input class="bid-input" id="bid" type="number" inputmode="numeric" oninput="calc()"></div>
      <div class="rpm" id="rpm"></div>
    </div>
    <div class="meta">
      <div class="m"><div class="m-label">Equipment</div><div class="m-val" id="equip">—</div></div>
      <div class="m"><div class="m-label">Type</div><div class="m-val" id="ltype">—</div></div>
    </div>
    <div class="broker" id="broker"></div>
    <button class="btn btn-go"    id="go"    onclick="act('send')">SEND BID</button>
    <button class="btn btn-draft" id="draft" onclick="act('draft')">DRAFT BID</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const API   = "https://edgeai-gmail-webhook-417422203146.us-central1.run.app";
  const EP    = { send: "/ace-send-bid", draft: "/ace-draft-bid" };
  const VERB  = { send: "SEND BID",      draft: "DRAFT BID" };
  const token = new URLSearchParams(location.search).get("t");
  let miles = null;
  let busy  = false;

  const SAMPLE = {pickup_city:"Humble",pickup_state:"TX",delivery_city:"Stillwater",delivery_state:"OK",
                  miles:497,suggested_rate:2250,pickup_date:"07/07 08:00",delivery_date:"07/08 14:00",
                  vehicle_size:"Sprinter",load_type:"Van",broker_name:"XTX Transport"};

  (async function(){
    let L = SAMPLE;                            // fallback so the page renders w/o a live token
    if(token){ try{ const r=await fetch(API+"/ace-load-info?t="+encodeURIComponent(token)); if(r.ok) L=await r.json(); }catch(e){} }
    render(L);
    // CONSUME-GUARD (UX layer). Authoritative guard is first-wins in the endpoint.
    if(L && (L.consumed === true || L.consumed_at)) lockCard(L);
  })();

  function lockCard(L){
    const d = L.decision === "draft" ? "drafted" : "actioned";
    document.querySelector(".card").innerHTML =
      '<div class="kicker">ACE+ · Already Actioned</div>' +
      '<div style="text-align:center;color:#e8a020;font-size:40px;margin:20px 0">!</div>' +
      '<div style="text-align:center;color:#aaa">This load was already ' + d + '.</div>';
  }

  function render(L){
    document.getElementById("lane-from").textContent=[L.pickup_city,L.pickup_state].filter(Boolean).join(", ")||"—";
    document.getElementById("lane-to").textContent=[L.delivery_city,L.delivery_state].filter(Boolean).join(", ")||"—";
    miles=L.miles||null;
    document.getElementById("miles").textContent=miles?miles+" mi":"";
    document.getElementById("bid").value=L.suggested_rate?Math.round(L.suggested_rate):"";
    document.getElementById("equip").textContent=L.vehicle_size||"Any";
    document.getElementById("ltype").textContent=L.load_type||"—";
    document.getElementById("broker").innerHTML=L.broker_name?"via <b>"+L.broker_name+"</b>":"";
    let any=false;
    if(L.pickup_date){document.getElementById("sched-pickup").textContent=L.pickup_date;any=true;}else document.getElementById("row-pickup").style.display="none";
    if(L.delivery_date){document.getElementById("sched-delivery").textContent=L.delivery_date;any=true;}else document.getElementById("row-delivery").style.display="none";
    if(any)document.getElementById("sched").style.display="block";
    calc();
  }

  function calc(){
    const amt=parseFloat(document.getElementById("bid").value);
    document.getElementById("rpm").textContent=(amt&&miles)?("$"+(amt/miles).toFixed(2)+" / mi"):"";
  }

  // SEND is two-tap armed (irreversible — fires a real email to the broker).
  // DRAFT is single-tap (reversible — just stages a Gmail draft).
  // Matches CONFIRM=true / CONFIRM=false in ace-bid.html / ace-draft.html.
  let armed=false, armTimer=null;

  function disarm(){
    clearTimeout(armTimer); armed=false;
    const go=document.getElementById("go");
    go.textContent=VERB.send; go.style.background=""; go.style.color="";
  }

  async function act(mode){
    if(busy) return;
    const m=document.getElementById("msg");
    const go=document.getElementById("go"), dr=document.getElementById("draft");
    const btn = mode==="send" ? go : dr;
    const amt=parseFloat(document.getElementById("bid").value);

    if(!amt||amt<=0){ m.textContent="Enter a bid amount"; return; }

    if(mode==="draft" && armed) disarm();      // switching action cancels the arm

    if(mode==="send" && !armed){
      armed=true;
      go.textContent="TAP AGAIN: $"+amt.toLocaleString();
      go.style.background="#e8a020"; go.style.color="#0a0a0a";
      m.textContent="Confirm amount, tap again to send";
      armTimer=setTimeout(function(){ armed=false; go.textContent=VERB.send; go.style.background=""; go.style.color=""; m.textContent=""; },2500);
      return;
    }
    if(mode==="send") disarm();

    if(!token){ m.textContent="(preview — no live token)"; return; }

    busy=true; go.disabled=true; dr.disabled=true;
    m.textContent = mode==="send" ? "Sending..." : "Drafting...";

    try{
      const r=await fetch(API+EP[mode],{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({t:token,bid_amount:amt})     // identical payload to legacy pages
      });
      const d=await r.json();

      if(r.ok && d.status==="already-actioned"){ lockCard({decision:null}); return; }

      if(r.ok){
        const head = mode==="send" ? "ACE+ · Bid Sent" : "ACE+ · Draft Ready";
        const line = mode==="send"
          ? "Bid of $"+amt.toLocaleString()+" sent to the broker."
          : "Draft of $"+amt.toLocaleString()+" staged in your Gmail.";
        document.querySelector(".card").innerHTML=
          '<div class="kicker">'+head+'</div>'+
          '<div style="text-align:center;color:#c8f135;font-size:40px;margin:20px 0">&#10003;</div>'+
          '<div style="text-align:center;color:#aaa">'+line+'</div>';
        return;
      }
      m.textContent=d.error||d.status||"Error — try again";
    }catch(e){
      m.textContent="Network error — try again";
    }
    busy=false; go.disabled=false; dr.disabled=false;
    go.textContent=VERB.send; dr.textContent=VERB.draft;
  }
</script>
</body>
</html>
