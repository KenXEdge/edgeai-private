<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EDGE · Confirm Booking</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#f0f0f0;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.card{background:#111;border:1px solid #222;border-radius:12px;padding:48px 40px;text-align:center;max-width:420px;width:90%}.title{font-size:20px;font-weight:700;margin-bottom:8px}.detail{font-size:28px;font-weight:800;color:#c8f135;margin:16px 0}.sub{font-size:13px;color:#666;margin-bottom:32px}.btn{display:block;width:100%;padding:16px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:none;margin-bottom:12px}.btn-yes{background:#c8f135;color:#0a0a0a}.btn-no{background:#1a1a1a;color:#888;border:1px solid #333}.msg{margin-top:16px;font-size:13px;color:#666}</style></head><body><div class="card"><div class="title">Confirm Booking</div><div id="detail" class="detail">Ready to book</div><div class="sub">Tap YES to send the booking email to the broker.</div><button class="btn btn-yes" onclick="book()">YES, BOOK IT</button><button class="btn btn-no" onclick="history.back()">NO, GO BACK</button><div class="msg" id="msg"></div></div><script>const p=new URLSearchParams(location.search),t=p.get("t");async function book(){const m=document.getElementById("msg");m.textContent="Sending...";try{const r=await fetch("https://edgeai-gmail-webhook-417422203146.us-central1.run.app/book-confirm",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});const d=await r.json();if(r.ok){location.href="/booked"}else{m.textContent=d.error||"Error — try again"}}catch(e){m.textContent="Network error — try again"}}</script></div></body></html>
