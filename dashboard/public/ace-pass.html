<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACE+ · Pass</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#f0f0f0;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#111;border:1px solid #222;border-radius:12px;padding:36px 30px;max-width:420px;width:90%}
  .kicker{font-size:11px;letter-spacing:2px;color:#e06a5a;text-transform:uppercase;text-align:center;margin-bottom:22px;font-weight:700}
  .lane{text-align:center}
  .lane-city{font-size:24px;font-weight:800;color:#f0f0f0;line-height:1.2}
  .lane-mid{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0;color:#555}
  .lane-mid .line{height:1px;width:40px;background:#2a2a2a}
  .lane-mid .miles{font-size:12px;color:#888;white-space:nowrap}
  .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#222;border:1px solid #222;border-radius:10px;overflow:hidden;margin:26px 0 16px}
  .m{background:#0e0e0e;padding:14px 8px;text-align:center}
  .m-label{font-size:9px;letter-spacing:1.5px;color:#777;text-transform:uppercase;margin-bottom:5px}
  .m-val{font-size:16px;font-weight:800;color:#c8f135}
  .broker{text-align:center;font-size:13px;color:#777;margin-bottom:22px}
  .broker b{color:#aaa;font-weight:600}
  .sub{font-size:13px;color:#666;text-align:center;margin-bottom:22px}
  .btn{display:block;width:100%;padding:16px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:none;margin-bottom:12px}
  .btn-pass{background:#2a1a1a;color:#e06a5a;border:1px solid #4a2a2a}
  .btn-back{background:#1a1a1a;color:#888;border:1px solid #333}
  .msg{margin-top:6px;font-size:13px;color:#888;text-align:center;min-height:18px}
  .sched{display:none;border:1px solid #222;border-radius:10px;margin:0 0 16px;overflow:hidden}
  .sched-row{display:flex;justify-content:space-between;padding:11px 16px;font-size:13px}
  .sched-row+.sched-row{border-top:1px solid #1c1c1c}
  .sched-label{color:#777}
  .sched-val{color:#e8e8e8;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">ACE+ · Pass</div>
    <div class="lane">
      <div class="lane-city" id="lane-from">—</div>
      <div class="lane-mid"><span class="line"></span><span class="miles" id="miles"></span><span class="line"></span></div>
      <div class="lane-city" id="lane-to">—</div>
    </div>
    <div class="sched" id="sched">
      <div class="sched-row" id="row-pickup"><span class="sched-label">Pickup</span><span class="sched-val" id="sched-pickup"></span></div>
      <div class="sched-row" id="row-delivery"><span class="sched-label">Delivery</span><span class="sched-val" id="sched-delivery"></span></div>
    </div>
    <div class="meta">
      <div class="m"><div class="m-label">Rate</div><div class="m-val" id="rate">—</div></div>
      <div class="m"><div class="m-label">Per Mile</div><div class="m-val" id="rpm">—</div></div>
      <div class="m"><div class="m-label">Equipment</div><div class="m-val" id="equip">—</div></div>
    </div>
    <div class="broker" id="broker"></div>
    <div class="sub">Pass on this load. No response is sent to the broker.</div>
    <button class="btn btn-pass" id="go" onclick="doPass()">CONFIRM PASS</button>
    <button class="btn btn-back" onclick="history.back()">GO BACK</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const API = "https://edgeai-gmail-webhook-417422203146.us-central1.run.app";
  const token = new URLSearchParams(location.search).get("t");
  const SAMPLE = {pickup_city:"Humble",pickup_state:"TX",delivery_city:"Stillwater",delivery_state:"OK",
                  miles:497,suggested_rate:2250,pickup_date:"07/07 08:00",delivery_date:"07/08 14:00",vehicle_size:"Sprinter",broker_name:"XTX Transport"};
  (async function(){
    let L=SAMPLE;
    if(token){ try{ const r=await fetch(API+"/ace-load-info?t="+encodeURIComponent(token)); if(r.ok) L=await r.json(); }catch(e){} }
    render(L);
  })();
  function render(L){
    document.getElementById("lane-from").textContent=[L.pickup_city,L.pickup_state].filter(Boolean).join(", ")||"—";
    document.getElementById("lane-to").textContent=[L.delivery_city,L.delivery_state].filter(Boolean).join(", ")||"—";
    document.getElementById("miles").textContent=L.miles?L.miles+" mi":"";
    document.getElementById("rate").textContent=L.suggested_rate?"$"+Number(L.suggested_rate).toLocaleString():"—";
    const rpm=(L.suggested_rate&&L.miles)?(L.suggested_rate/L.miles):null;
    document.getElementById("rpm").textContent=rpm?"$"+rpm.toFixed(2):"—";
    document.getElementById("equip").textContent=L.vehicle_size||"Any";
    document.getElementById("broker").innerHTML=L.broker_name?"via <b>"+L.broker_name+"</b>":"";
    let any=false;
    if(L.pickup_date){document.getElementById("sched-pickup").textContent=L.pickup_date;any=true;}else document.getElementById("row-pickup").style.display="none";
    if(L.delivery_date){document.getElementById("sched-delivery").textContent=L.delivery_date;any=true;}else document.getElementById("row-delivery").style.display="none";
    if(any)document.getElementById("sched").style.display="block";

  }
  async function doPass(){
    const m=document.getElementById("msg"), go=document.getElementById("go");
    if(!token){ m.textContent="(preview — no live token)"; return; }
    go.disabled=true; m.textContent="Passing...";
    try{
      const r=await fetch(API+"/ace-pass",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({t:token})});
      const d=await r.json();
      if(r.ok){ document.querySelector(".card").innerHTML='<div class="kicker">ACE+ · Passed</div><div style="text-align:center;color:#e06a5a;font-size:40px;margin:20px 0">✕</div><div style="text-align:center;color:#aaa">Passed. No further alerts on this load.</div>'; }
      else{ m.textContent=d.error||d.status||"Error — try again"; go.disabled=false; }
    }catch(e){ m.textContent="Network error — try again"; go.disabled=false; }
  }
</script>
</body>
</html>
