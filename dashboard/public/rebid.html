<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EDGE · Counter Offer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#f0f0f0;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.card{background:#111;border:1px solid #222;border-radius:12px;padding:48px 40px;text-align:center;max-width:420px;width:90%}.title{font-size:20px;font-weight:700;margin-bottom:8px}.offer{font-size:14px;color:#666;margin-bottom:24px}.label{font-size:12px;color:#888;text-align:left;margin-bottom:6px;display:block}.input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px 16px;font-size:24px;font-weight:700;color:#c8f135;text-align:center;margin-bottom:24px}.btn{display:block;width:100%;padding:16px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:none;background:#c8f135;color:#0a0a0a}.msg{margin-top:16px;font-size:13px;color:#666}</style></head><body><div class="card"><div class="title">Send Counter Offer</div><div class="offer" id="offer"></div><span class="label">YOUR COUNTER ($)</span><input class="input" type="number" id="amount" placeholder="0"/><button class="btn" onclick="submit()">SEND COUNTER</button><div class="msg" id="msg"></div></div><script>const p=new URLSearchParams(location.search),t=p.get("t"),o=p.get("offer");if(o)document.getElementById("offer").textContent="Broker offer: $"+o;async function submit(){const a=document.getElementById("amount").value,m=document.getElementById("msg");if(!a||isNaN(a)||+a<=0){m.textContent="Enter a valid amount";return}m.textContent="Sending...";try{const r=await fetch("https://edgeai-gmail-webhook-417422203146.us-central1.run.app/rebid-submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t,counter_amount:+a})});const d=await r.json();if(r.ok){location.href="/counter-sent"}else{m.text
