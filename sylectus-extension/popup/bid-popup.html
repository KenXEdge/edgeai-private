<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE — Load Alert</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:420px;
  background:#0d0d0d;
  color:#fff;
  font-family:'Barlow',sans-serif;
  font-size:13px;
  overflow:hidden;
}

/* HEADER */
.ace-header{
  background:#111;
  border-bottom:3px solid #E8A020;
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.ace-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;
  font-weight:900;
  color:#E8A020;
  letter-spacing:2px;
  text-transform:uppercase;
}
.ace-badge{
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.4);
}
.new-tag{
  background:#E8A020;
  color:#000;
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  padding:2px 7px;
  border-radius:3px;
  text-transform:uppercase;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

/* LOAD CARD */
.load-card{
  background:#141414;
  border:1px solid rgba(232,160,32,0.2);
  border-radius:6px;
  margin:12px;
  overflow:hidden;
}

.load-lane{
  background:linear-gradient(135deg, #1a1200 0%, #1a1a1a 100%);
  padding:14px 16px;
  border-bottom:1px solid rgba(232,160,32,0.15);
}
.lane-cities{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  line-height:1;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
}
.lane-arrow{color:#E8A020;font-size:18px}
.lane-meta{
  display:flex;
  gap:16px;
  margin-top:8px;
}
.lane-chip{
  font-size:11px;
  color:rgba(255,255,255,0.5);
  display:flex;
  align-items:center;
  gap:4px;
}
.lane-chip strong{color:#fff;font-weight:600}

/* LOAD DETAILS */
.load-details{
  padding:12px 16px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.detail-item{
  background:#1a1a1a;
  border-radius:4px;
  padding:8px 10px;
}
.detail-label{
  font-size:9px;
  color:rgba(255,255,255,0.35);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:3px;
}
.detail-value{
  font-size:13px;
  font-weight:600;
  color:#fff;
  line-height:1.2;
}
.detail-value.gold{color:#E8A020}

/* BROKER INFO */
.broker-info{
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.broker-name{font-weight:600;font-size:13px}
.broker-meta{font-size:11px;color:rgba(255,255,255,0.4)}
.credit-score{
  font-size:11px;
  font-weight:700;
  padding:3px 8px;
  border-radius:3px;
  background:rgba(46,204,113,0.15);
  color:#2ecc71;
  border:1px solid rgba(46,204,113,0.2);
}

/* RAW DATA BLOCK */
.raw-block{
  padding:8px 16px;
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:rgba(255,255,255,0.3);
  line-height:1.5;
  border-bottom:1px solid rgba(255,255,255,0.06);
  max-height:60px;
  overflow:hidden;
  background:#0d0d0d;
}

/* RATE SECTION */
.rate-section{
  padding:14px 16px;
}
.rate-label{
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.4);
  margin-bottom:10px;
}
.rate-suggested{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.suggested-amount{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;
  font-weight:900;
  color:#E8A020;
  line-height:1;
}
.suggested-calc{
  font-size:11px;
  color:rgba(255,255,255,0.3);
  line-height:1.5;
}

/* RATE INPUT */
.rate-input-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:14px;
}
.rate-prefix{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:700;
  color:rgba(255,255,255,0.3);
}
.rate-input{
  flex:1;
  background:#1a1a1a;
  border:2px solid rgba(232,160,32,0.3);
  border-radius:6px;
  padding:10px 14px;
  color:#E8A020;
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:700;
  outline:none;
  transition:border-color 0.2s;
  letter-spacing:1px;
}
.rate-input:focus{border-color:#E8A020}
.rate-input::placeholder{color:rgba(232,160,32,0.2)}
.use-suggested{
  font-size:10px;
  color:#E8A020;
  cursor:pointer;
  text-decoration:underline;
  white-space:nowrap;
  opacity:0.7;
}
.use-suggested:hover{opacity:1}

/* ACTION BUTTONS */
.action-buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.btn-pass{
  background:rgba(231,76,60,0.12);
  border:1px solid rgba(231,76,60,0.3);
  color:#e74c3c;
  border-radius:5px;
  padding:11px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-pass:hover{background:rgba(231,76,60,0.25);border-color:#e74c3c}

.btn-draft{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.7);
  border-radius:5px;
  padding:11px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-draft:hover{background:rgba(255,255,255,0.12);color:#fff}

.btn-send{
  background:#E8A020;
  border:1px solid #E8A020;
  color:#000;
  border-radius:5px;
  padding:11px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  font-weight:900;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-send:hover{background:#d4911c}
.btn-send:disabled{background:rgba(232,160,32,0.3);color:rgba(0,0,0,0.5);cursor:not-allowed}

/* STATUS BAR */
.status-bar{
  background:#0a0a0a;
  padding:8px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-top:1px solid rgba(255,255,255,0.05);
}
.status-text{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;display:inline-block;margin-right:5px;box-shadow:0 0 4px rgba(46,204,113,0.6)}

/* FEEDBACK */
.feedback{
  text-align:center;
  padding:12px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:1px;
  display:none;
  border-radius:4px;
  margin:0 12px 12px;
}
.feedback.success{background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)}
.feedback.passed{background:rgba(231,76,60,0.1);color:#e74c3c;border:1px solid rgba(231,76,60,0.2)}
</style>
</head>
<body>

<div class="ace-header">
  <div>
    <div class="ace-logo">⚡ ACE</div>
    <div class="ace-badge">Load Alert — Sylectus</div>
  </div>
  <div class="new-tag">NEW LOAD</div>
</div>

<div class="load-card">

  <!-- Lane -->
  <div class="load-lane">
    <div class="lane-cities">
      <span id="pickup-city">—</span>
      <span class="lane-arrow">→</span>
      <span id="delivery-city">—</span>
    </div>
    <div class="lane-meta">
      <div class="lane-chip">📅 PU: <strong id="pickup-date">—</strong></div>
      <div class="lane-chip">🏁 DEL: <strong id="delivery-date">—</strong></div>
    </div>
    <div id="footnotes-wrap" style="display:none;margin-top:8px;background:rgba(232,160,32,0.08);border-left:3px solid #E8A020;border-radius:0 4px 4px 0;padding:6px 10px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#E8A020;margin-bottom:3px;">Special Instructions</div>
      <div id="footnotes" style="font-size:12px;color:#fff;line-height:1.5;font-weight:500;"></div>
    </div>
  </div>

  <!-- Details Grid -->
  <div class="load-details">
    <div class="detail-item">
      <div class="detail-label">Miles</div>
      <div class="detail-value gold" id="miles">—</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Vehicle</div>
      <div class="detail-value" id="vehicle-size">—</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Weight</div>
      <div class="detail-value" id="weight">—</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Pickup</div>
      <div class="detail-value" id="pickup-full">—</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Delivery</div>
      <div class="detail-value" id="delivery-full">—</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Order #</div>
      <div class="detail-value" id="order-no">—</div>
    </div>
  </div>

  <!-- Broker -->
  <div class="broker-info">
    <div>
      <div class="broker-name" id="broker-name">—</div>
      <div class="broker-meta" id="broker-phone">—</div>
      <div class="broker-meta" id="broker-email" style="color:rgba(232,160,32,0.6)">—</div>
    </div>
  </div>

  <!-- Raw block -->
  <div class="raw-block" id="raw-block">Loading load data...</div>

</div>

<!-- Rate Section -->
<div class="rate-section">
  <div class="rate-label">Your Bid</div>
  <div class="rate-suggested">
    <div class="suggested-amount" id="suggested-amount">$—</div>
    <div class="suggested-calc" id="suggested-calc">— mi × $2.75 RPM<br>suggested rate</div>
  </div>

  <div class="rate-input-row">
    <div class="rate-prefix">$</div>
    <input type="number" class="rate-input" id="bid-amount" placeholder="360" min="100" max="9999" step="25">
    <span class="use-suggested" id="use-suggested-btn">Use suggested</span>
  </div>

  <div class="action-buttons">
    <button class="btn-pass" id="btn-pass">✕ Pass</button>
    <button class="btn-draft" id="btn-draft">📋 Draft</button>
    <button class="btn-send" id="btn-send">⚡ Send Now</button>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<div class="status-bar">
  <div><span class="status-dot"></span><span class="status-text">ACE watching Sylectus 24/7</span></div>
  <div class="status-text" id="notes-text"></div>
</div>

<script src="bid-popup.js"></script>
</body>
</html>
